<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find - Kokoa Clone</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="status-bar">
    <div class="status-bar__column"><span>SKT</span><i class="fas fa-wifi"></i></div>
    <div class="status-bar__column"><span>18:43</span></div>
    <div class="status-bar__column"><span>90%</span><i class="fas fa-battery-full fa-lg"></i><i class="fas fa-bolt"></i></div>
  </div>

  <header class="screen-header">
    <h1 class="screen-header__title">Find</h1>
    <div class="screen-header__icons">
      <span><i class="fas fa-search"></i></span>
      <span><a href="settings.html"><i class="fas fa-cog"></i></a></span>
    </div>
  </header>

  <main class="find-screen">
    <div class="icon-row">
      <div class="icon-row__icon"><i class="fas fa-qrcode"></i><span>QR Code</span></div>
      <div class="icon-row__icon"><i class="far fa-address-book"></i><span>Add by Contacts</span></div>
      <div class="icon-row__icon"><i class="fas fa-fingerprint"></i><span>Add by ID</span></div>
      <div class="icon-row__icon"><i class="far fa-envelope"></i><span>Invite</span></div>
    </div>
    
    <div class="recommended-friends">
      <h6 class="recommended-friends__title">Recommended Friends</h6>
      <span>You have no recommended friends.</span>
    </div>
  </main>

  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="far fa-user fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link" href="chats.html"><i class="far fa-comment fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link active" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link" href="more.html"><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
    </ul>
  </nav>
</body>
</html>
