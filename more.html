<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>More - Kokoa Clone</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="status-bar">
    <div class="status-bar__column"><span>SKT</span><i class="fas fa-wifi"></i></div>
    <div class="status-bar__column"><span>18:43</span></div>
    <div class="status-bar__column"><span>90%</span><i class="fas fa-battery-full fa-lg"></i><i class="fas fa-bolt"></i></div>
  </div>

  <header class="screen-header">
    <h1 class="screen-header__title">More</h1>
    <div class="screen-header__icons">
      <span><i class="fas fa-search"></i></span>
      <span><i class="fas fa-music"></i></span>
      <span><a href="settings.html"><i class="fas fa-cog"></i></a></span>
    </div>
  </header>

  <main class="more-screen">
    <div class="user-row user-row--large">
      <img src="singlion.png" class="avatar avatar-lg" />
      <div class="user-info">
        <span class="user-name">thanksgaga</span>
        <span class="user-status">+82 10-1234-5678</span>
      </div>
      <i class="far fa-comment-alt fa-2x"></i>
    </div>

    <div class="more-grid">
      <div class="more-grid__item"><i class="far fa-calendar-alt"></i><span>Calendar</span></div>
      <div class="more-grid__item"><i class="far fa-smile-beam"></i><span>Emoticons</span></div>
      <div class="more-grid__item"><i class="fas fa-paint-roller"></i><span>Themes</span></div>
      <div class="more-grid__item"><i class="fas fa-file-invoice-dollar"></i><span>Account</span></div>
    </div>
  </main>

  <nav class="nav">
    <ul class="nav__list">
      <li class="nav__btn"><a class="nav__link" href="friends.html"><i class="far fa-user fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link" href="chats.html"><i class="far fa-comment fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link" href="find.html"><i class="fas fa-search fa-2x"></i></a></li>
      <li class="nav__btn"><a class="nav__link active" href="more.html"><i class="fas fa-ellipsis-h fa-2x"></i></a></li>
    </ul>
  </nav>
</body>
</html>
