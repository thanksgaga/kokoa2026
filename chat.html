<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - Kokoa Clone</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body id="chat-room">
  <div class="status-bar">
    <div class="status-bar__column"><span>SKT</span><i class="fas fa-wifi"></i></div>
    <div class="status-bar__column"><span>18:43</span></div>
    <div class="status-bar__column"><span>90%</span><i class="fas fa-battery-full fa-lg"></i><i class="fas fa-bolt"></i></div>
  </div>

  <header class="screen-header screen-header--chat">
    <div class="screen-header__icons">
      <a href="chats.html"><i class="fas fa-angle-left fa-2x"></i></a>
    </div>
    <h1 class="screen-header__title">GitHub</h1>
    <div class="screen-header__icons">
      <span><i class="fas fa-search"></i></span>
      <span><i class="fas fa-bars"></i></span>
    </div>
  </header>

  <main class="chat-screen">
    <div class="chat__timestamp">Tuesday, June 30, 2026</div>

    <div class="message-row">
      <img src="https://avatars.githubusercontent.com/u/9919" class="avatar" />
      <div class="message-row__content">
        <span class="message__author">GitHub</span>
        <div class="message__info">
          <span class="message__bubble">Did you push your code?</span>
          <span class="message__time">21:22</span>
        </div>
      </div>
    </div>

    <div class="message-row message-row--own">
      <div class="message-row__content">
        <div class="message__info">
          <span class="message__bubble">Doing it now! 🚀</span>
          <span class="message__time">21:23</span>
        </div>
      </div>
    </div>
  </main>

  <form class="reply-bar">
    <div class="reply-bar__column">
      <i class="far fa-plus-square fa-lg"></i>
    </div>
    <div class="reply-bar__column">
      <input type="text" placeholder="Write a message..." />
      <i class="far fa-smile-wink fa-lg"></i>
      <button>
        <i class="fas fa-arrow-up"></i>
      </button>
    </div>
  </form>
</body>
</html>
