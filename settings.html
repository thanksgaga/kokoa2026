<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Kokoa Clone</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <div class="status-bar">
    <div class="status-bar__column"><span>SKT</span><i class="fas fa-wifi"></i></div>
    <div class="status-bar__column"><span>18:43</span></div>
    <div class="status-bar__column"><span>90%</span><i class="fas fa-battery-full fa-lg"></i><i class="fas fa-bolt"></i></div>
  </div>

  <header class="screen-header">
    <div class="screen-header__icons">
      <a href="more.html"><i class="fas fa-angle-left fa-2x"></i></a>
    </div>
    <h1 class="screen-header__title">Settings</h1>
    <div class="screen-header__icons">
      <span><i class="fas fa-search"></i></span>
    </div>
  </header>

  <main class="settings-screen">
    <ul class="settings-list">
      <li class="settings-list__item">
        <div class="settings-list__left">
          <i class="fas fa-bullhorn"></i>
          <span>Notices</span>
        </div>
      </li>
      <li class="settings-list__item">
        <div class="settings-list__left">
          <i class="fas fa-flask"></i>
          <span>Kokoa Lab</span>
        </div>
      </li>
      <li class="settings-list__item">
        <div class="settings-list__left">
          <i class="fas fa-info-circle"></i>
          <span>Version</span>
        </div>
        <div class="settings-list__right">
          <span class="settings-list__subtext">Latest Version</span>
        </div>
      </li>
      <li class="settings-list__item">
        <div class="settings-list__left">
          <i class="far fa-bell"></i>
          <span>Notifications</span>
        </div>
        <div class="settings-list__right">
          <div class="toggle-switch">
            <input type="checkbox" id="notif-toggle" checked>
            <label for="notif-toggle"></label>
          </div>
        </div>
      </li>
    </ul>
  </main>
</body>
</html>
